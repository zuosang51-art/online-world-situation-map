<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>实时战线系统 v1</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;}
#map{height:100vh;}
#ui{
position:absolute;
top:10px;
left:10px;
z-index:999;
background:white;
padding:10px;
border-radius:8px;
font-family:sans-serif;
}
</style>

</head>

<body>

<div id="ui">
🟢 实时战线系统<br>
每5秒自动更新
</div>

<div id="map"></div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>

<script>

let map = L.map('map').setView([48.5,37.8],6);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

init(map);

</script>

</body>
</html>
