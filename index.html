<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>终极战线GIS系统</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;}
#map{height:100vh;}
#ui{
position:absolute;
top:10px;
left:10px;
z-index:999;
background:white;
padding:10px;
border-radius:8px;
}
</style>

</head>

<body>

<div id="ui">
<button onclick="play()">播放</button>
<button onclick="pause()">暂停</button>
</div>

<div id="map"></div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="loader.js"></script>

<script>

let map = L.map('map').setView([48.5,37.8],6);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

init(map);

// 模拟加载数据
fetch("data.json")
.then(r=>r.json())
.then(d=>{
loadYear(d["2024"]);
});

function play(){
playAnimation();
}

function pause(){
clearInterval(animationTimer);
}

</script>

</body>
</html>
