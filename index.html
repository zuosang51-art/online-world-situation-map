<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>战线地图系统</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{height:100%;margin:0;}
#map{height:100vh;width:100%;}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="data.js"></script>

<script>

//====================
// 初始化地图
//====================
var map = L.map('map').setView([48.5, 37.8], 6);

//====================
// 底图
//====================
var osm = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var sat = L.tileLayer(
'https://webrd0.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}'
);

//====================
// 图层控制
//====================
var baseMaps = {
"普通地图": osm,
"卫星地图": sat
};

//====================
// 战线图层组
//====================
var redZone = L.layerGroup().addTo(map);
var blueZone = L.layerGroup().addTo(map);
var frontLine = L.layerGroup().addTo(map);
var points = L.layerGroup().addTo(map);

//====================
// 添加控制区（红蓝）
//====================
data.redZones.forEach(z => {
L.polygon(z.coords, {
color: "red",
fillColor: "red",
fillOpacity: 0.3
}).bindPopup(z.name).addTo(redZone);
});

data.blueZones.forEach(z => {
L.polygon(z.coords, {
color: "blue",
fillColor: "blue",
fillOpacity: 0.3
}).bindPopup(z.name).addTo(blueZone);
});

//====================
// 前线
//====================
data.frontLines.forEach(line => {
L.polyline(line.coords, {
color: "black",
weight: 3
}).bindPopup(line.name).addTo(frontLine);
});

//====================
// 节点
//====================
data.points.forEach(p => {
L.marker(p.coords)
.bindPopup(p.name)
.addTo(points);
});

//====================
// 图层菜单
//====================
var overlays = {
"红色控制区": redZone,
"蓝色控制区": blueZone,
"前线": frontLine,
"节点": points
};

L.control.layers(baseMaps, overlays).addTo(map);

</script>

</body>
</html>
