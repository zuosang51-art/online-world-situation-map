<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>战线地图系统 v3（自动时间轴）</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;}
#map{height:100vh;}

#panel{
position:absolute;
top:10px;
left:10px;
z-index:999;
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
font-family:sans-serif;
}

button{margin:3px;}
</style>

</head>

<body>

<div id="panel">

<div>
<button onclick="play()">▶ 播放</button>
<button onclick="pause()">⏸ 暂停</button>
</div>

<div>
速度：
<button onclick="setSpeed(2000)">慢</button>
<button onclick="setSpeed(1000)">中</button>
<button onclick="setSpeed(500)">快</button>
</div>

<div id="yearDisplay">当前：2024</div>

</div>

<div id="map"></div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="data.js"></script>

<script>

//====================
// 地图初始化
//====================
var map = L.map('map').setView([48.5, 37.8], 6);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

//====================
// 图层
//====================
var layerGroup = L.layerGroup().addTo(map);

//====================
// 时间控制
//====================
var years = ["2024","2025","2026"];
var index = 0;
var timer = null;
var speed = 1000;

//====================
// 渲染函数
//====================
function render(year){

layerGroup.clearLayers();

document.getElementById("yearDisplay").innerText =
"当前：" + year;

var d = data[year];

// 红区
d.redZones.forEach(z=>{
L.polygon(z.coords,{
color:"red",
fillColor:"red",
fillOpacity:0.3
}).addTo(layerGroup).bindPopup(z.name);
});

// 蓝区
d.blueZones.forEach(z=>{
L.polygon(z.coords,{
color:"blue",
fillColor:"blue",
fillOpacity:0.3
}).addTo(layerGroup).bindPopup(z.name);
});

// 前线
d.frontLines.forEach(l=>{
L.polyline(l.coords,{
color:"black",
weight:3
}).addTo(layerGroup).bindPopup(l.name);
});

// 点
d.points.forEach(p=>{
L.marker(p.coords)
.addTo(layerGroup)
.bindPopup(p.name);
});

}

//====================
// 播放控制
//====================
function play(){

if(timer) return;

timer = setInterval(()=>{

render(years[index]);

index++;

if(index >= years.length){
index = 0;
}

}, speed);

}

function pause(){
clearInterval(timer);
timer = null;
}

function setSpeed(ms){
speed = ms;
pause();
play();
}

// 初始
render(years[0]);

</script>

</body>
</html>
